name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          PUBLIC_GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          PUBLIC_GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
          PUBLIC_GITHUB_REPO: ${{ secrets.GITHUB_REPO }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist/ --project-name=utsabdangol --commit-dirty=true
